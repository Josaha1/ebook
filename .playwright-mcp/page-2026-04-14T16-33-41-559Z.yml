        - generic [ref=e46]:
          - paragraph [ref=e47]:
            - text: บทบาทอิสระบทบาทหนึ่งของวิชาชีพพยาบาลคือ
            - strong [ref=e48]: บทบาทการสอน การให้ความรู้ และคำแนะนำผู้ป่วย
            - text: ซึ่งรูปแบบการสอนและการให้คำแนะนำแต่เดิมจะใช้คนหรือตัวพยาบาลพูดสอนหรือสื่อสารผู้ป่วยด้วยวาจาและท่าทางเป็นรายเดี่ยวหรือรายกลุ่ม แต่การให้ข้อมูล การให้คำแนะนำ หรือการสอนผู้ป่วยและญาติโดยใช้คนสู่คน นอกจากจะทำให้เสียเวลาการทำกิจกรรมทางการพยาบาลช่วยเหลือผู้ป่วยและญาติแล้ว การสอนปากเปล่าอาจไม่ครบถ้วนตามเอกสารหรือครอบคลุมครบถ้วน
          - paragraph [ref=e49]: การใช้คนยังมีข้อจำกัด เริ่มตั้งแต่บุคลิก ท่าทาง การถ่ายทอดผู้พูดไม่จูงใจให้ผู้รับฟังสนใจ หรือไม่เข้าใจ อีกทั้งสัมพันธภาพในการสอนหรือการให้คำแนะนำทางสุขภาพของพยาบาลไม่เหมือนกับการสอนระหว่างครูกับศิษย์ ครูกับศิษย์มีจุดมุ่งหมายคล้ายๆกันคือครูต้องการให้ความรู้ในขณะที่ศิษย์ก็ต้องการความรู้เช่นกัน แต่สำหรับพยาบาลที่จำเป็นต้องให้ความรู้ คำแนะนำให้ผู้ป่วยได้รับการดูแลสุขภาพที่ดีตามสภาพที่เป็นไปได้ในชุมชน ซึ่งอาจมีญาติหรือผู้ดูแลบางรายที่พบพยาบาลแต่ไม่ต้องการข้อมูลคำแนะนำนั้น เนื่องจากรอผู้ดูแลตัวจริงซึ่งอาจติดภาระอยู่ที่บ้าน ที่ทำงาน หรือวางแผนให้เจ้าหน้าที่สุขภาพทีมอื่นมาดูแลต่อเนื่อง การเข้าถึงข้อมูลอาจไม่ตรงความมุ่งหมายที่พยาบาลทำกิจกรรมการสอน
          - paragraph [ref=e50]: ต่อมายุคสื่อและอุปกรณ์ต่างๆ พยาบาลเริ่มนำสื่อและอุปกรณ์ทางเทคโนโลยีการสื่อสารมาใช้ เช่น การบันทึกภาพเป็นภาพนิ่งลงกระดาษ บันทึกเสียง สื่อวีดีทัศน์ และใช้อุปกรณ์ต่างๆ มาพัฒนาใช้ทางการพยาบาลเพื่อเพิ่มจุดสนใจมากขึ้น เพื่อลดการใช้คน ลดข้อจำกัดในการสื่อสารหรือสอนผู้ป่วยโดยใช้คน แต่ในทางปฏิบัติการนำความรู้ที่เป็นกลับบ้านยังเป็นรูปแบบเอกสารเป็นส่วนใหญ่ การใช้ภาพ เสียงในรูปวีดีทัศน์ คลิปวีดีโอ (Clip VDO) ยังเป็นสิ่งที่ยุ่งยาก การนำเอาสารกลับบ้านอาจไม่ได้หยิบมาอ่านหรือทบทวนอีกเลย หรือฉีกขาดสูญหายไป
