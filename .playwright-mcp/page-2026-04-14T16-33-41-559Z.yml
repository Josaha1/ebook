      - generic [ref=e71]:
        - paragraph [ref=e72]:
          - text: จากสถิติข้อร้องเรียนของกระทรวงสาธารณสุขพบว่า ข้อร้องเรียนการให้บริการของโรงพยาบาลในสังกัดกระทรวงสาธารณสุขจากประชาชน ผ่านทางหนังสือพิมพ์ในปี 2555 มีถึง
          - strong [ref=e73]: 17 เรื่อง
          - text: สาเหตุส่วนใหญ่มาจากพฤติกรรมการบริการ และ
          - strong [ref=e74]: ร้อยละ 50 เกิดจากการขาดการสื่อสารที่เหมาะสม
        - paragraph [ref=e75]:
          - text: ในขณะที่ผลการศึกษาการร้องเรียนผู้ประกอบวิชาชีพการพยาบาลต่อสภาการพยาบาลแห่งประเทศไทย ศึกษาเรื่องร้องเรียนมายังสภาการพยาบาลตั้งแต่ปี พ.ศ. 2551 ถึง พ.ศ. 2557 อ้างถึงการศึกษาของการวิจัยของ
          - strong [ref=e76]: พรชัย ดีไพศาลสกุล
          - text: ว่า ความเข้าใจของผู้ใช้บริการในสาเหตุที่ทำให้พยาบาลเกิดแรงกดดันจากการทำงาน อาทิ อัตราบุคลากรไม่เพียงพอกับภาระงาน รับผิดชอบหลายหน้าที่ และงานเร่งรีบไม่เพียงพอต่อการระงับความไม่พึงพอใจของผู้ใช้บริการ ทำให้พยาบาลได้รับการตำหนิจากผู้ใช้บริการบ่อยครั้ง และนำมาสู่เหตุให้เกิดการร้องเรียน/ฟ้องร้อง
        - paragraph [ref=e77]:
          - text: โดยปัญหาพฤติกรรมที่ไม่พึงประสงค์ อันเป็นเหตุให้เกิดการร้องเรียน ได้แก่ ปัญหาการแสดงสีหน้า อาการ การสื่อสาร และลักษณะสัมพันธภาพกับผู้ใช้บริการ และเมื่อทบทวนสถิติข้อร้องเรียนจากพฤติกรรมการบริการผู้ป่วยใน
          - strong [ref=e78]: โรงพยาบาลนภาลัย
          - text: ปี 2557 จำนวน 7 ราย ปี 2558 จำนวน 4 ราย และปี 2559 จำนวน 4 ราย ซึ่งในความเป็นจริงเมื่อสืบค้นปัญหาความพึงพอใจในการบริการผู้ป่วยแล้วพบว่าพฤติกรรมการบริการโดยใช้คำพูดและท่าทางของเจ้าหน้าที่มีทุกเดือน
        - paragraph [ref=e79]:
          - text: ปัจจุบัน การสื่อสารในระบบ
          - strong [ref=e80]: iOS
          - text: และ
          - strong [ref=e81]: Android
          - text: มีบทบาทสำคัญในการสื่อสารและเติบโตขึ้นอย่างรวดเร็ว ทำให้ทุกคนไม่สนใจการเรียนรู้ด้วยวิธีเดิมๆ หรือแบบเก่าอีก แทบทุกคนทุกบ้านจะมีอุปกรณ์ที่จำเป็นใช้นั่นคือ มือถือ Tablet และ Smart Phone การหันกลับมาอ่านเอกสารคำแนะนำจากกระดาษและภาพอย่างเดียวไม่จูงใจให้สนใจ สิ้นเปลือง ไม่เหมาะกับสภาพการพัฒนาเทคโนโลยีปัจจุบัน
        - paragraph [ref=e82]:
          - text: การให้ข้อมูลผู้รับบริการโรงพยาบาลนภาลัยโดยใช้สื่อเทคโนโลยีเรียนรู้ผ่านสื่อบนมือถือด้วย
          - strong [ref=e83]: Augmented Reality
          - text: หรือเทคโนโลยีใหม่ที่พัฒนารูปแบบ
          - strong [ref=e84]: Human-Machine Interface
          - text: ที่อาศัยเทคโนโลยีคอมพิวเตอร์ และระบบความจริงเสริมโดยการเอาภาพกราฟิกของคอมพิวเตอร์ทั้งในรูปแบบที่เป็น 3D, 2D หรือ Video มาซ้อนทับเข้ากับฉากหลังซึ่งเป็นภาพในเวลาจริง จะช่วยให้ผู้รับบริการทางสุขภาพเข้าถึงข้อมูลได้มาก หรือผู้ให้บริการได้เผยแพร่ความรู้คำแนะนำทางด้านสุขภาพได้รวดเร็วทันสมัย ไม่สิ้นเปลืองคน กระดาษ สิ่งของหรือทรัพยากรต่างๆ ซึ่งเป็นประโยชน์ต่อการดูแลสุขภาพผู้ป่วยระยะยาว
