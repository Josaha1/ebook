          - generic [ref=e49]: "2.1"
          - generic [ref=e50]: กระบวนการสื่อสาร (Communication Process)
        - paragraph [ref=e52]: กระบวนการสื่อสาร (Communication Process) เริ่มต้นจากผู้ส่งข่าวสารมีข่าวที่จะให้กับผู้รับข่าวสาร ข่าวสารที่จะส่งอาจจะเป็นข้อมูลที่เป็นความรู้ ความคิด ความรู้สึก โดยผู้ส่งข่าวสารเลือกวิธีที่จะส่งข่าวสาร เช่น การพูด การเขียน หรือการใช้ภาษาท่าทาง เมื่อผู้รับข่าวสารได้รับข่าวสารจะเกิดการส่งข้อมูลตอบกลับไปยังผู้ส่งข่าวสาร เพื่อให้ผู้ส่งข่าวสารแน่ใจว่าได้รับข่าวแล้ว หรือมีการส่งข่าวสารโต้ตอบกันต่อไป เนื่องจากการสื่อสารเป็นกระบวนการที่ไม่อยู่นิ่งและมีความต่อเนื่องกัน
