        - generic [ref=e58]:
          - paragraph [ref=e59]:
            - text: การสื่อสาร คือ
            - strong [ref=e60]: กระบวนการแลกเปลี่ยนและร่วมกันรับรู้เรื่องราวข่าวสารต่างๆ
            - text: โดยมีความเข้าใจร่วมกันต่อสัญลักษณ์ที่แสดงเรื่องราวข่าวสารนั้นๆ การสื่อสารมีความสำคัญในฐานะที่เป็นความจำเป็นพื้นฐานอย่างหนึ่งในชีวิตมนุษย์ มีผลต่อความเป็นสังคม การดำเนินชีวิตประจำวัน อุตสาหกรรม ธุรกิจ การปกครอง และการเมืองระหว่างประเทศ
          - paragraph [ref=e61]: พิจารณาในส่วนที่เกี่ยวกับสาธารณสุข การสื่อสารมีความสำคัญต่อการพัฒนาคุณภาพชีวิต และต่อวิชาชีพพยาบาลเป็นอย่างยิ่ง ซึ่งกิจกรรมทางการพยาบาลในบทบาทอิสระด้านการสื่อสารและให้คำปรึกษาของพยาบาล คือ การให้ข้อมูลเพื่อเอื้อให้เกิดการตัดสินใจที่ถูกต้องเหมาะสม การเป็นที่ปรึกษาในการตัดสินใจเกี่ยวกับการดูแล การให้ข้อมูลความรู้ คำแนะนำการสอนผู้ป่วยและครอบครัว/ผู้ดูแล และการสื่อสารเพื่อให้เกิดการวางแผนการดูแลล่วงหน้า ซึ่งเทคนิครูปแบบการสื่อสาร หรือการสอน หรือการให้คำแนะนำ พัฒนาให้ทันสมัยขึ้นเรื่อยๆ ตามวิวัฒนาการของเทคโนโลยี
          - paragraph [ref=e62]:
            - text: ในปัจจุบัน เทคโนโลยีของ
            - strong [ref=e63]: อุปกรณ์เคลื่อนที่ (Mobile device)
            - text: อย่างเช่น โทรศัพท์เคลื่อนที่ และคอมพิวเตอร์มือถือ มีการพัฒนาไปอย่างรวดเร็ว สังเกตได้จากความสามารถที่มีมากขึ้นทางด้านส่วนรับข้อมูล ทางด้านส่วนต่อประสานกับผู้ใช้ ทางด้านความบันเทิง และทางด้านการเชื่อมต่อ เป็นต้น จึงส่งผลให้ระบบปฏิบัติการที่ใช้งานกับอุปกรณ์เคลื่อนที่ต่างๆ ได้มีการพัฒนามากขึ้น เพื่อมารองรับการทำงานของเทคโนโลยีใหม่ที่ถูกพัฒนาขึ้นมา ในส่วนของระบบปฏิบัติการบนมือถือก็ได้มีการพัฒนาไว้หลายรุ่นหลายระบบด้วยเช่นกัน
