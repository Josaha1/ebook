        - paragraph [ref=e98]: "คิวอาร์โค้ด (QR Code : Quick Response) เรียกว่าบาร์โค้ด 2 มิติ คือ รหัสชนิดหนึ่งซึ่งสามารถเก็บข้อมูลสินค้า เช่น ชื่อ ราคาสินค้า เบอร์โทรศัพท์ติดต่อ และชื่อเว็บไซต์ เป็นการพัฒนามาจากบาร์โค้ด โดยบริษัทเดนโซ-เวฟ ซึ่งเป็นบริษัทในเครือของโตโยต้า ประเทศญี่ปุ่น คิดค้นขึ้นในปี ค.ศ. 1994 และได้จดทะเบียนลิขสิทธิ์ชื่อ \"QR Code\" แล้วทั้งในญี่ปุ่น และทั่วโลก ผู้คิดค้นที่พัฒนาคิวอาร์โค้ดมุ่งเน้นให้สามารถถูกอ่านได้อย่างรวดเร็ว โดยการอ่านคิวอาร์โค้ดนิยมใช้กับโทรศัพท์มือถือรุ่นที่มีกล้องถ่ายภาพ และสามารถติดตั้งซอฟต์แวร์เพิ่มเติมได้"
